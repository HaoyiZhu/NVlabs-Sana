services:
  sana-wm-pr:
    build:
      context: .
      dockerfile: Dockerfile.sana-wm-pr
    image: sana-wm-pr379:local
    shm_size: "16gb"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["1"]
              capabilities: ["gpu"]
    environment:
      NVIDIA_VISIBLE_DEVICES: "1"
      NVIDIA_DRIVER_CAPABILITIES: "compute,utility"
      CUDA_VISIBLE_DEVICES: "0"
      HF_HOME: /hf-cache
      HUGGINGFACE_HUB_CACHE: /hf-cache/hub
      PYTORCH_CUDA_ALLOC_CONF: expandable_segments:True
      DISABLE_XFORMERS: "1"
      PYTHONPATH: /workspace
      PYTHONFAULTHANDLER: "1"
    volumes:
      - .:/workspace
      - sana-wm-pr-hf-cache:/hf-cache
    working_dir: /workspace
    command: ["python", "-c", "import torch; print(torch.cuda.get_device_name(0))"]

volumes:
  sana-wm-pr-hf-cache:
